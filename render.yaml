services:
  - type: web
    name: certifind-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: SUPABASE_URL
        sync: false # Set securely in Render Dashboard
      - key: SUPABASE_ANON_KEY
        sync: false # Set securely in Render Dashboard
